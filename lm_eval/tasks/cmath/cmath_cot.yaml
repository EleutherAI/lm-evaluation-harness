task: cmath_cot
dataset_path: weitianwen/cmath
dataset_name: default
test_split: test
validation_split: validation
output_type: generate_until
doc_to_text: "题目：{{question}}\n逐步解答："
doc_to_target: "{{golden}}"
generation_kwargs:
  until:
    - "\n\n"
    - "题目："
  do_sample: false
  temperature: 0.0
filter_list:
  - name: strict-match
    filter:
      - function: regex
        regex_pattern: '答案[是为：:]\s*(-?[0-9][0-9.,/]*)'
      - function: take_first
  - name: flexible-extract
    filter:
      - function: regex
        group_select: -1
        regex_pattern: "(-?[$0-9.,/]{2,})|(-?[0-9]+)"
      - function: take_first
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
metadata:
  version: 1.0
