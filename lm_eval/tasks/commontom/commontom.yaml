
task: commontom
custom_dataset: !function utils.load_dataset
output_type: generate_until
doc_to_text: !function utils.doc_to_text
process_results: !function utils.process_results
generation_kwargs:
  until:
    - "\n"
  max_gen_toks: 4
  do_sample: false
  temperature: 0.0
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: macro_f1
    aggregation: !function utils.macro_f1_agg
    higher_is_better: true
metadata:
  version: 0
