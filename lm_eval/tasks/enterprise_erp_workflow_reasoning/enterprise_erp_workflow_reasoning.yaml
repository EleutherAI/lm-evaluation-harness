task: enterprise_erp_workflow_reasoning
dataset_path: karthikchundi/enterprise_erp_workflow_reasoning
test_split: test
output_type: multiple_choice
doc_to_text: "The following question describes an enterprise ERP business process scenario. Select the most accurate answer.\n\n{{question.strip()}}\nA. {{choices[0]}}\nB. {{choices[1]}}\nC. {{choices[2]}}\nD. {{choices[3]}}\nAnswer:"
doc_to_choice: ["A", "B", "C", "D"]
doc_to_target: answer
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
