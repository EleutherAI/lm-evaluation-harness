tag:
  - math_word_problems
task: hendrycks_math_algebra
dataset_path: EleutherAI/hendrycks_math
process_docs: !function utils.process_docs
dataset_name: algebra
output_type: generate_until
training_split: train
test_split: test
description: "Here is a math problem, let's think succinctly step by step and find the solution. Your answer should end with '$$\\boxed{answer}$$' where [answer] is just the final number or expression that solves the problem.\n"
doc_to_text: "Problem: {{problem}}\n"
process_results: !function utils.process_results
doc_to_target: "{{answer}}"
generation_kwargs:
  until: []
  max_gen_toks: 16384
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
  - metric: flexible_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: 2.0
