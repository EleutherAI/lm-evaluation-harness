task: kangaroo_math
dataset_path: DFKI-SLT/kangaroo_math_benchmark
dataset_name: null
dataset_kwargs: null

training_split: null
validation_split: null
test_split: train

doc_to_image:
  - image
doc_to_text: "<image>Du bist ein mathematisches Assistenzsystem für Multiple-Choice-Aufgaben. Analysiere das Bild und wähle die korrekte Antwort: A, B, C, D oder E. Antworte nur mit einem einzigen Buchstaben, der die richtige Antwort darstellt, z.B. 'X' wobei X = A, B, C, D oder E."
doc_to_target: ground_truth

output_type: generate_until
generation_kwargs:
  max_gen_toks: 5
  temperature: 0.0
  do_sample: false

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true

metadata:
  version: 0.1
