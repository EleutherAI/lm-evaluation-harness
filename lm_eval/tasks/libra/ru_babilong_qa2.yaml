  {{context}}

  В качестве ответа необходимо вывести ОДНО СЛОВО (название места, имя человека или название предмета). Без дополнительных слов, объяснений или знаков препинания. Ответ пиши после слова "Ответ:" через пробел ("Ответ: <слово>").

  Вопрос: {{input}}

  Ответ:'
