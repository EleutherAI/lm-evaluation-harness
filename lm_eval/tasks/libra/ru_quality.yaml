tag:
- libra
task: ru_quality
task_alias: ruQuALITY
dataset_name: ru_quality
dataset_kwargs:
  dataset_name: ru_quality
include: _template_yaml
doc_to_text: 'Тебе предоставляется длинный текст, в котором нужно найти ответ на вопрос. Тебе будут даны несколько вариантов ответов, выбери только один правильный вариант и выведи его.

  {{context}}

  В качестве ответа необходимо вывести ТОЛЬКО правильный вариант ответа, дословно как он указан в тексте вопроса, включая букву варианта в скобках в начале (например: "(А) текст варианта" или "(Б) текст варианта"). Без дополнительных слов или объяснений перед или после варианта. Ответ пиши после слова "Ответ:" через пробел ("Ответ: (Б) Их подсознание выявило, что Корвин был неразрешимой проблемой. Это же подсознание побудило их предоставить ресурсы для его побега, чтобы им больше не приходилось иметь с ним дело.").

  Вопрос: {{input}}

  Ответ:'
generation_kwargs:
  do_sample: false
  temperature: 0.0
  max_gen_toks: 256
metric_list:
- metric: libra_score
  aggregation: !function utils.aggregate_results_em
  higher_is_better: true
  weight_by_size: true
metadata:
  version: 2.0
