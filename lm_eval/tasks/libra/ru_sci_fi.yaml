doc_to_text: 'Тебе предоставляется описание вымышленного научно-фантастического мира. Ниже приведен вопрос об утверждении, которое нужно оценить относительно описанного выше вымышленного мира. Определи, является ли это утверждение правдой или ложью в контексте описанного мира. Выбери один из четырех вариантов ответа.

  {{context}}

  Ниже приведен вопрос об утверждении, которое нужно оценить относительно описанного выше вымышленного мира. Определи, является ли это утверждение правдой или ложью в контексте описанного мира.

  {{input}}

  В качестве ответа необходимо вывести ОДИН из следующих вариантов ответа ПОЛНОСТЬЮ, дословно, без изменений:

  - Правда/В реальной жизни: Ложь
  - Правда/В реальной жизни: Правда
  - Ложь/В реальной жизни: Ложь
  - Ложь/В реальной жизни: Правда

  Ответ пиши после слова "Ответ:" через пробел ("Ответ: Правда/В реальной жизни: Ложь").

  Ответ:'
