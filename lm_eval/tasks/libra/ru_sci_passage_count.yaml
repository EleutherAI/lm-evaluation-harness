include: _template_yaml
doc_to_text: 'Ниже приведены несколько параграфов. Некоторые из них могут быть дубликатами (полностью идентичными). Внимательно прочитай все параграфы и определи, сколько уникальных (неповторяющихся) параграфов содержится в тексте после удаления дубликатов. Выведи только число.

  {{context}}

  В качестве ответа необходимо вывести ТОЛЬКО число. Не пиши слова, не пиши объяснения, не ставь точки или другие знаки. Только цифра (например: 12). Ответ пиши после слова "Ответ:" через пробел ("Ответ: 12").

  {{input}}

  Ответ:'
generation_kwargs:
  do_sample: false
  temperature: 0.0
  max_gen_toks: 8
metric_list:
- metric: libra_score
  aggregation: !function utils.aggregate_results_count_score
  higher_is_better: true
