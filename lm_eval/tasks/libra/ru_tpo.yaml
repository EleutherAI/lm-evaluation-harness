tag:
- libra
task: ru_tpo
task_alias: ruTPO
dataset_name: ru_tpo
dataset_kwargs:
  dataset_name: ru_tpo
include: _template_yaml
doc_to_text: 'Тебе предоставляется длинный текст, в котором нужно найти ответ на вопрос и вывести его кратко.

  {{context}}

  В качестве ответа необходимо вывести КРАТКИЙ ответ без дополнительных объяснений. Если ответа нет в тексте, выведи "Не указано". Числа и даты пиши цифрами. Ответ пиши после слова "Ответ:" через пробел ("Ответ: <краткий ответ>").

  Вопрос: {{input}}

  Ответ:'
generation_kwargs:
  do_sample: false
  temperature: 0.0
  max_gen_toks: 32
metric_list:
- metric: libra_score
  aggregation: !function utils.aggregate_results_em
  higher_is_better: true
  weight_by_size: true
metadata:
  version: 2.0
