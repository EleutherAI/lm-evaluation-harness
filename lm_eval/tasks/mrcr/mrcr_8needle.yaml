task: mrcr_8needle
class: !function task.MRCR
tag:
  - mrcr
custom_dataset: !function utils.load_dataset
dataset_kwargs:
  num_needles: 8
output_type: generate_until
test_split: train
num_fewshot: 0
doc_to_text: messages
doc_to_target: answer
process_results: !function utils.process_results
generation_kwargs:
  until: !function utils.DEFAULT_STOP_SEQUENCES
metric_list:
