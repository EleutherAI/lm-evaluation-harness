task: negotiationtom_intention
custom_dataset: !function utils.load_dataset
dataset_kwargs:
  mode: intention
test_split: test
output_type: generate_until
doc_to_text: !function utils.doc_to_text
doc_to_target: gold_labels
process_results: !function utils.process_intent_results
generation_kwargs:
  until:
    - "\n"
  max_gen_toks: 48
  do_sample: false
  temperature: 0.0
metric_list:
  - metric: micro_f1
    aggregation: !function utils.micro_f1_agg
    higher_is_better: true
  - metric: macro_f1
    aggregation: !function utils.macro_f1_agg
    higher_is_better: true
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: 0
