# Shared config for OpenSubtitles multilingual translation tasks.
# Included by pair.yaml and auto-generated pairs/*.yaml files.
output_type: generate_until
custom_dataset: !function utils.load_opensubtitles_parallel
doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
test_split: devtest
target_delimiter: ''
generation_kwargs:
  until:
    - "\n"
    - "<|im_end|>"
    - "</s>"
    - "<|endoftext|>"
    - "<|eot_id|>"
    - "<|end_of_text|>"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 128
metric_list:
  - metric: bleu
    aggregation: bleu
    higher_is_better: true
  - metric: chrf
    aggregation: chrf
    higher_is_better: true
metadata:
  version: 1
  dataset_dir: Helsinki-NLP/OpenSubtitles2024-40-langs-15-movies
  split: devtest
