task: oracle_erp_workflow
dataset_path: karthikchundi/oracle-erp-workflow-eval
dataset_name: null
test_split: train
output_type: generate_until
doc_to_text: "You are an expert in Oracle ERP Cloud applications. Answer the following question accurately and concisely.\n\n{{question}}\nAnswer:"
doc_to_target: "{{answer}}"
generation_kwargs:
  until:
    - "\n\n"
    - "\n"
  max_gen_toks: 64
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
metadata:
  version: 1.0
  description: "Tests LLM knowledge of Oracle ERP Cloud workflows and terminology across Procurement, HCM, General Ledger, Fixed Assets, SCM, EPM Planning, and OIC."
