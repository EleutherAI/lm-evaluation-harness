tag:
  - pt_benchmark
  - cultural_reasoning

task: broverbs_proverb_to_history
task_alias: broverbs_p2h

dataset_path: Tropic-AI/BRoverbs
custom_dataset: !function util.broverbs_proverb_to_history_custom_dataset

test_split: test

fewshot_config:
  sampler: first_n
  samples: !function util.broverbs_proverb_to_history_fewshot_samples

num_fewshot: 5

description: "A seguir há um provérbio brasileiro. Escolha a história que melhor corresponde ao seu significado. Responda apenas com as letras \"A\", \"B\", \"C\", \"D\" ou \"E\".\n\n"

output_type: generate_until

doc_to_text: !function util.broverbs_proverb_to_history_doc_to_text
doc_to_target: !function util.broverbs_correct_index_target

generation_kwargs:
  until:
    - "\n"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  top_k: null
  top_p: null

filter_list:
  - name: all
    filter:
      - function: find_choices_with_think
        choices: ["A", "B", "C", "D", "E"]
        fallback: "[invalid]"
      - function: take_first

metric_list:
  - metric: f1_macro_score
    aggregation: f1_macro_score
    higher_is_better: true
  - metric: acc
    aggregation: pt_acc
    higher_is_better: true

metadata:
  version: 1.0