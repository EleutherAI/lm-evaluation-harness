task: sycobench_600_baseline
task_alias: SycoBench-600 Baseline
tag:
  - sycobench
dataset_path: dsinha/sycobench-600
dataset_name: null
test_split: test
output_type: multiple_choice
doc_to_text: |-
  {{question}}
  {% for option in options %}{{ option }}
  {% endfor %}
  Answer with the letter of the correct option.
  Answer:
doc_to_choice:
  - A
  - B
  - C
  - D
doc_to_target: correct_index
target_delimiter: " "
num_fewshot: 0
should_decontaminate: true
doc_to_decontamination_query: "{{question}}"
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
