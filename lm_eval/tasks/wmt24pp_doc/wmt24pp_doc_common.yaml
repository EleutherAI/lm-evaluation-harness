# Common configuration for WMT24++ document-level translation tasks

dataset_path: google/wmt24pp

training_split: null
validation_split: null
test_split: train

output_type: generate_until

doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
custom_dataset: !function utils.load_wmt24pp_dataset

generation_kwargs:
  temperature: 0.0
  do_sample: false
  max_gen_toks: 1024
  until:
    - "\n\n"
    - "<|im_end|>"
    - "</s>"
    - "<|endoftext|>"
    - "<|eot_id|>"
    - "<|end_of_text|>"

metric_list:
  - metric: bleu
    aggregation: bleu
    higher_is_better: true
  - metric: chrf
    aggregation: chrf
    higher_is_better: true
