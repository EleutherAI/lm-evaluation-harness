# Common configuration for document-level WMT GeneralMT testset translation tasks

training_split: null
validation_split: null
test_split: test

output_type: generate_until

doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
custom_dataset: !function utils.load_wmt_generalmt_dataset

generation_kwargs:
  temperature: 0.0
  do_sample: false
  max_gen_toks: 2048
  until:
      - "\n\n"
      - "<|im_end|>"
      - "</s>"
      - "<|endoftext|>"
      - "<|eot_id|>"
      - "<|end_of_text|>"
      
metric_list:
  - metric: bleu
    aggregation: bleu
    higher_is_better: true
  - metric: chrf
    aggregation: chrf
    higher_is_better: true
