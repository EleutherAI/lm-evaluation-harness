# Group with two children differing only by @suffix (tests ambiguous path error)
group: preset_ambiguous_group
task:
  - task: ambig_child@cloze
    dataset_path: json
    dataset_kwargs:
      data_files:
        test: tests/test_configs/test_data.json
    test_split: test
    doc_to_text: "question"
    doc_to_target: "answer"
    doc_to_choice: "choices"
  - task: ambig_child@mcqa
    dataset_path: json
    dataset_kwargs:
      data_files:
        test: tests/test_configs/test_data.json
    test_split: test
    doc_to_text: "question"
    doc_to_target: "answer"
    doc_to_choice: "choices"
