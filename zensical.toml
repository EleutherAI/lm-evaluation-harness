[project]
site_name = "LM Evaluation Harness"
site_url = "https://lm-evaluation-harness.readthedocs.io/"
site_description = "A framework for evaluating language models"
site_author = "EleutherAI"
repo_url = "https://github.com/EleutherAI/lm-evaluation-harness"
repo_name = "EleutherAI/lm-evaluation-harness"
edit_uri = "edit/main/docs/"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Quickstart" = "getting_started/quickstart.md" },
    { "Installation" = "getting_started/installation.md" },
    { "Concepts & Architecture" = "getting_started/concepts.md" },
  ]},
  { "Running Evaluations" = [
    { "CLI Reference" = "running_evals/cli_reference.md" },
    { "Python API" = "running_evals/python_api.md" },
    { "Configuration Files" = "running_evals/config_files.md" },
    { "Chat Templates" = "running_evals/chat_templates.md" },
    { "Common Pitfalls" = "running_evals/common_pitfalls.md" },
  ]},
  { "Writing Tasks" = [
    { "Your First Task" = "writing_tasks/your_first_task.md" },
    { "Prompt Formats" = "writing_tasks/prompt_formats.md" },
    { "Scoring & Metrics" = "writing_tasks/scoring_and_metrics.md" },
    { "Filters" = "writing_tasks/filters.md" },
    { "Groups & Benchmarks" = "writing_tasks/groups_and_benchmarks.md" },
    { "Task Configuration Reference" = "writing_tasks/task_config_reference.md" },
  ]},
  { "Extending the Framework" = [
    { "Custom Model Backend" = "extending/custom_model.md" },
    { "API Model Backend" = "extending/api_model.md" },
    { "Custom Scorers" = "extending/custom_scorers.md" },
    { "Custom Metrics & Filters" = "extending/custom_metrics_and_filters.md" },
  ]},
  { "Migrating from v0.4" = "migration_v0_5.md" },
  { "API Reference" = [
    "api/index.md",
    { "Entry Points" = [
      { "Evaluate" = "api/entry_points.md" },
      { "TaskManager" = "api/lm_eval.tasks.md" },
      { "CLI" = "api/evaluation_config.md" },
    ]},
    { "Models" = [
      { "Available Backends" = "api/lm_eval.models.md" },
      { "LM Base Class" = "api/lm_base_class.md" },
    ]},
    { "Configuration" = [
      { "TaskConfig" = "api/task_configuration.md" },
      { "GroupConfig" = "api/group_configuration.md" },
    ]},
    { "Tasks" = [
      { "Task Class" = "api/task_class.md" },
      { "Groups" = "api/groups.md" },
    ]},
    { "Metrics & Scoring" = [
      { "Metrics" = "api/metrics.md" },
      { "Scorers" = "api/lm_eval.scorers.md" },
      { "Filters" = "api/lm_eval.filters.md" },
    ]},
  ]},
  { "Contributing" = "contributing.md" },
]

[project.theme]
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "navigation.indexes",
  "search.highlight",
  "search.suggest",
  "content.code.copy",
  "content.code.annotate",
  "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["."]
inventories = []

[project.plugins.mkdocstrings.handlers.python.options]
show_source = true
show_root_heading = true
show_root_full_path = false
show_category_heading = true
show_symbol_type_heading = true
show_symbol_type_toc = true
docstring_style = "google"
docstring_section_style = "spacy"
members_order = "source"
merge_init_into_class = true
show_if_no_docstring = true
signature_crossrefs = true
separate_signature = true
unwrap_annotated = true
show_signature_annotations = true
show_attribute_values = true
show_inheritance_diagram = true
relative_crossrefs = true
scoped_crossrefs = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
